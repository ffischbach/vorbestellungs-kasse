{% extends "base.html" %}

{% block content %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.store('overview', { subtab: localStorage.getItem('overview.subtab') || 'zeitfenster' });
    Alpine.effect(() => {
        localStorage.setItem('overview.subtab', Alpine.store('overview').subtab);
    });

    Alpine.data('qrScanner', () => ({
        open: false,
        status: 'idle',
        stream: null,
        timerId: null,
        dbg: '',

        async openScanner() {
            this.open = true;
            this.status = 'scanning';
            this.dbg = '';
            await this.$nextTick();
            const video = this.$refs.qrVideo;
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = this.stream;
                await video.play();
                this.scheduleNext(video);
            } catch (e) {
                this.status = 'error';
                this.dbg = 'getUserMedia: ' + e.message;
            }
        },

        scheduleNext(video) {
            this.timerId = setTimeout(() => this.tick(video), 200);
        },

        tick(video) {
            if (!this.open || this.status !== 'scanning') return;

            if (video.readyState >= 2 && video.videoWidth > 0) {
                const canvas = this.$refs.qrCanvas;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let code = null;
                try { code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' }); }
                catch (e) { this.dbg = 'jsQR Fehler: ' + e.message; this.scheduleNext(video); return; }

                if (code) {
                    const s = code.data.trim();
                    const m = s.match(/\d+/);
                    const orderId = m ? m[0] : null;
                    this.dbg = `✓ ${code.data}` + (orderId ? '' : ' – ID unklar');
                    if (orderId) {
                        this.closeScanner();
                        const input = document.querySelector('[name=q]');
                        if (input) { input.value = orderId; htmx.trigger(input, 'input'); input.focus(); }
                        return;
                    }
                } else {
                    this.dbg = `${canvas.width}×${canvas.height} | kein Code`;
                }
            } else {
                this.dbg = `warte... readyState=${video.readyState} ${video.videoWidth}×${video.videoHeight}`;
            }
            this.scheduleNext(video);
        },

        closeScanner() {
            this.open = false;
            this.status = 'idle';
            this.dbg = '';
            if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
            if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
        }
    }));
});

</script>

<div class="mb-4">
    <div
        id="stats"
        hx-get="/orders/stats"
        hx-trigger="load, every 15s"
        hx-swap="innerHTML"
    ></div>
</div>

<div x-data="{ tab: localStorage.getItem('tab') || 'search' }"
     x-init="$watch('tab', v => localStorage.setItem('tab', v))"
     @switch-to-order.window="
         tab = 'search';
         $nextTick(() => {
             const input = document.querySelector('[name=q]');
             if (input) {
                 input.value = $event.detail.orderId;
                 htmx.trigger(input, 'input');
                 input.focus();
             }
         })
     ">
    <div class="tab-bar mb-4">
        <button class="tab-btn" :class="{ 'tab-btn--active': tab === 'search' }" @click="tab = 'search'">
            Suche
        </button>
        <button class="tab-btn" :class="{ 'tab-btn--active': tab === 'overview' }" @click="tab = 'overview'; $nextTick(() => htmx.trigger(document.getElementById('overview-content'), 'refresh'))">
            Übersicht
        </button>
    </div>

    <div x-show="tab === 'search'">
        <div x-data="qrScanner()">
            <div class="search-sticky">
                <div class="search-row">
                    <input
                        type="search"
                        name="q"
                        placeholder="Name, E-Mail oder Bestellnummer …"
                        class="input-search"
                        hx-get="/orders/search"
                        hx-trigger="input changed delay:200ms, search"
                        hx-target="#results"
                        hx-swap="innerHTML"
                        autocomplete="off"
                        autofocus
                    >
                    <button class="btn-qr" @click="openScanner()" type="button" title="QR-Code scannen" aria-label="QR-Code scannen">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
                            <path d="M4 7V4h3"/>
                            <path d="M17 4h3v3"/>
                            <path d="M4 17v3h3"/>
                            <path d="M17 20h3v-3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div x-show="open" x-cloak class="qr-overlay"
                 x-transition:enter="transition-opacity duration-200"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="transition-opacity duration-150"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 @keydown.escape.window="closeScanner()">

                <button class="qr-overlay__close" @click="closeScanner()" type="button" aria-label="Scanner schließen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>

                <div class="qr-video-container">
                    <video x-ref="qrVideo" class="qr-video" playsinline muted></video>
                    <canvas x-ref="qrCanvas" class="qr-canvas"></canvas>

                    <div class="qr-viewfinder" :class="{ 'qr-viewfinder--found': status === 'found' }">
                        <div class="qr-viewfinder__frame">
                            <div class="qr-viewfinder__corner qr-viewfinder__corner--tl"></div>
                            <div class="qr-viewfinder__corner qr-viewfinder__corner--tr"></div>
                            <div class="qr-viewfinder__corner qr-viewfinder__corner--bl"></div>
                            <div class="qr-viewfinder__corner qr-viewfinder__corner--br"></div>
                            <div x-show="status === 'found'" class="qr-viewfinder__check" aria-hidden="true">✓</div>
                        </div>
                    </div>
                </div>

                <p class="qr-hint"
                   :class="{ 'qr-hint--found': status === 'found', 'qr-hint--error': status === 'error' }"
                   x-text="status === 'found' ? 'Bestellung gefunden!' : status === 'error' ? 'Kamera konnte nicht geöffnet werden.' : 'QR-Code der Bestellung in die Kamera halten'">
                </p>
                <p x-show="dbg" x-text="dbg" style="color:#fff;font-size:11px;opacity:.7;margin-top:6px;word-break:break-all;text-align:center;padding:0 12px"></p>

                <button class="qr-cancel" @click="closeScanner()" type="button">
                    Abbrechen
                </button>
            </div>
        </div>

        <div id="results" class="space-y-3">
            <p class="text-center py-10 text-tertiary" style="font-size:var(--text-lg);">
                Suchbegriff eingeben …
            </p>
        </div>
    </div>

    <div x-show="tab === 'overview'" x-cloak>
        <div
            id="overview-content"
            hx-get="/orders/overview"
            hx-trigger="load, refresh"
            hx-swap="innerHTML"
        ></div>
    </div>
</div>

<script>
    (function() {
        const es = new EventSource('/events');
        es.onmessage = e => {
            const d = JSON.parse(e.data);
            if (d.type === 'pickup' || d.type === 'handout') {
                htmx.ajax('GET', '/orders/stats', {target: document.getElementById('stats'), swap: 'innerHTML'});
                htmx.ajax('GET', '/orders/overview', {target: document.getElementById('overview-content'), swap: 'innerHTML'});
            }
            if (d.type === 'pickup') {
                const card = document.querySelector(`[data-order-id="${d.order_id}"]`);
                if (card) htmx.ajax('GET', `/orders/${d.order_id}/card`, {target: card, swap: 'outerHTML'});
            }
        };
    })();
</script>
{% endblock %}
