<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vorbestellungs-Kasse{% endblock %}</title>
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/alpine.min.js" defer></script>
    <script>
      document.addEventListener('htmx:responseError', function(evt) {
        var flash = document.getElementById('flash');
        var html = evt.detail.xhr.responseText;
        if (flash && html) {
          flash.innerHTML = html;
          clearTimeout(flash._timer);
          flash._timer = setTimeout(function() { flash.innerHTML = ''; }, 5000);
        }
      });
    </script>
</head>
<body class="min-h-screen">
    <header class="app-header">
        <div class="app-header__inner">
            <nav class="app-header__nav">
                <a href="/" class="app-header__nav-link {% if active_page == 'kasse' %}app-header__nav-link--active{% endif %}">Kasse</a>
                <a href="/ausgabe" class="app-header__nav-link {% if active_page == 'ausgabe' %}app-header__nav-link--active{% endif %}">Ausgabe</a>
            </nav>
            <div class="app-header__actions">
                <div
                    id="printer-status"
                    hx-get="/admin/status"
                    hx-trigger="load, every 30s"
                    hx-swap="innerHTML"
                >
                    <span class="status-pill status-pill--offline">Drucker …</span>
                </div>
                <a href="/admin" class="app-header__link">Admin</a>
            </div>
        </div>
    </header>

    <div id="flash" aria-live="assertive" role="alert"></div>

    <main class="max-w-3xl mx-auto p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
