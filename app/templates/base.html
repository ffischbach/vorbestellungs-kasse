<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vorbestellungs-Kasse{% endblock %}</title>
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/jsqr.min.js"></script>
    <script src="/static/alpine.min.js" defer></script>
    <script>
      document.addEventListener('htmx:responseError', function(evt) {
        var flash = document.getElementById('flash');
        var html = evt.detail.xhr.responseText;
        if (flash && html) {
          flash.innerHTML = html;
        }
      });

      function localizeTimestamps(root) {
        (root || document).querySelectorAll('time[data-utc]').forEach(function(el) {
          var d = new Date(el.dataset.utc);
          el.textContent = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        });
      }
      document.addEventListener('DOMContentLoaded', function() { localizeTimestamps(); });
      document.addEventListener('htmx:afterSwap', function(e) { localizeTimestamps(e.detail.elt); });

      (function() {
        function tick() {
          var el = document.getElementById('live-clock');
          if (el) {
            el.textContent = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
          }
        }
        document.addEventListener('DOMContentLoaded', function() {
          tick();
          setInterval(tick, 1000);
        });
      })();
    </script>
</head>
<body class="min-h-screen">
    <header class="app-header">
        <div class="app-header__inner">
            <div class="app-header__brand">
                <span class="app-header__title">{{ settings.vereinsname if settings is defined else 'Kasse' }}</span>
                <nav class="app-header__nav">
                    <a href="/" class="app-header__nav-link {% if active_page == 'kasse' %}app-header__nav-link--active{% endif %}">Kasse</a>
                    <a href="/ausgabe" class="app-header__nav-link {% if active_page == 'ausgabe' %}app-header__nav-link--active{% endif %}">Ausgabe</a>
                </nav>
            </div>
            <div class="app-header__actions">
                <div
                    id="printer-status"
                    hx-get="/printer-status"
                    hx-trigger="load, every 30s"
                    hx-swap="innerHTML"
                >
                    <span class="status-pill status-pill--offline">Drucker …</span>
                </div>
                <span id="live-clock" class="app-header__clock"></span>
            </div>
        </div>
    </header>

    <div id="flash" aria-live="assertive" role="alert"></div>

    <main class="max-w-2xl mx-auto p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
