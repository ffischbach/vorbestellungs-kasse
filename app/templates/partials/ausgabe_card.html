<div class="ausgabe-card-compact" id="ausgabe-card-{{ order.order_id }}" x-data="{ loading: false }">
    <div class="ausgabe-card-compact__body">
        <div class="ausgabe-card-compact__head">
            <span class="ausgabe-card-compact__id">#{{ order.order_id }}</span>
            <div class="ausgabe-card-compact__badges">
                {% if order.togo %}<span class="badge badge-orange">To-Go</span>{% endif %}
                {% if order.abholzeit %}<span class="badge badge-blue">{{ order.abholzeit }}</span>{% endif %}
            </div>
        </div>
        <div class="ausgabe-card-compact__name">{{ order.first_name }} {{ order.last_name }}</div>
        <ul class="ausgabe-card-compact__items">
            {% for item in order.items %}
            <li><span class="ausgabe-card-compact__qty">{{ item.quantity }}×</span>{{ item.name }}</li>
            {% endfor %}
        </ul>
    </div>
    <button
        class="ausgabe-card-compact__action"
        hx-post="/orders/{{ order.order_id }}/handout"
        hx-target="#ausgabe-card-{{ order.order_id }}"
        hx-swap="outerHTML"
        hx-disabled-elt="this"
        @click="loading = true"
        :disabled="loading"
    >
        <span x-show="!loading">Ausgeben ✓</span>
        <span x-show="loading" x-cloak>…</span>
    </button>
</div>
